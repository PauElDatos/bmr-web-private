<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Datos de Mercado - N.Geolitics" />
  <title>Datos de Mercado</title>
  <link rel="icon" type="image/png" sizes="192x192" href="./faviconNG.png" />
  <link rel="shortcut icon" href="./favicon.ico" />
  <link rel="apple-touch-icon" sizes="192x192" href="./apple-touch-icon.png" />
  <link rel="stylesheet" href="./src/styles/main.css" />
  <script src="./auth-config.js"></script>
  <script>
    (function () {
      function isSmartphoneWebView() {
        var ua = navigator.userAgent || navigator.vendor || window.opera || '';
        var uaLooksMobile = /Android.+Mobile|iPhone|iPod|IEMobile|Windows Phone|BlackBerry|webOS|Opera Mini/i.test(ua);
        var narrowCoarsePointer = window.matchMedia && window.matchMedia('(max-width: 820px) and (pointer: coarse)').matches;
        return uaLooksMobile || narrowCoarsePointer;
      }
      if (isSmartphoneWebView()) {
        var mobileUrl = new URL('./mobile.html', window.location.href);
        mobileUrl.search = window.location.search;
        mobileUrl.hash = window.location.hash || '#/';
        window.location.replace(mobileUrl.toString());
      }
    }());
  </script>
</head>
<body>
  <div id="app" class="app-shell">
    <noscript>Esta web necesita JavaScript para cargar los JSON y pintar gráficos.</noscript>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
