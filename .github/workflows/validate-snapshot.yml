name: Validate BMR Web snapshot

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - "exporter/**"
      - "automation/**"
      - ".github/workflows/validate-snapshot.yml"
  pull_request:
    paths:
      - "web/**"
      - "exporter/**"
      - "automation/**"
  workflow_dispatch:
  schedule:
    # Validación diaria del snapshot ya publicado en el repositorio. No accede a MariaDB.
    - cron: "35 6 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install exporter dependencies
        run: python -m pip install -r exporter/requirements.txt

      - name: Validate JSON contract
        run: python exporter/validate_web_json.py --data-dir web/data --sample 10

      - name: Check JavaScript syntax
        run: |
          node --version
          find web/src -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Check automation scripts syntax
        run: |
          bash -n automation/run_daily_pipeline.sh
          bash -n automation/publish_to_github.sh
          bash -n automation/install_systemd_timer.sh
          python -m py_compile exporter/export_web_json.py exporter/validate_web_json.py automation/make_snapshot_status.py
